name: Release

# Caller stub for archetype A (desktop GUI). Job body lives upstream.
# See shared/standards/CI.md -> "Release workflow -- archetype A".

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    uses: luca-veronelli-stem/standards/.github/workflows/release-archetype-a.yml@v1.19.1
    with:
      app: ButtonPanelTester
      repo: button-panel-tester
      tag: ${{ inputs.tag }}
      # Publish the release zip to this repo's Bitbucket Downloads. This slug is
      # hard-coded, so the upstream upload step runs on every release -- you must
      # provision the BITBUCKET_API_TOKEN secret (repository access token,
      # repository:write, set manually per repo, same as BITBUCKET_SSH_KEY) or
      # the upload fails 401.
      bitbucket-repo: stem-fw/button-panel-tester
    secrets:
      BITBUCKET_API_TOKEN: ${{ secrets.BITBUCKET_API_TOKEN }}
